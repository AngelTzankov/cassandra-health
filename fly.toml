app = "cassandra-health"
primary_region = "lhr"

[build]

[env]
  PUBLIC_BASE_URL = "https://cassandra-health.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
